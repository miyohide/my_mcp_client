spring.application.name=mymcp

# -----------------------------------------------
# Amazon Bedrock 接続設定
# -----------------------------------------------
spring.ai.bedrock.aws.region=${AWS_REGION:us-east-1}
# 認証情報は環境変数 AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY、
# または ~/.aws/credentials から自動解決される

# 使用するモデル（Bedrock Converse API 経由）
spring.ai.bedrock.converse.chat.options.model=${BEDROCK_MODEL_ID:us.amazon.nova-pro-v1:0}

# -----------------------------------------------
# Spring AI MCP クライアント設定
# -----------------------------------------------
spring.ai.mcp.client.type=SYNC

# MCPサーバー接続設定（Streamable HTTP / SSE）
spring.ai.mcp.client.stdio.connections.aws-knowledge.command=uvx
spring.ai.mcp.client.stdio.connections.aws-knowledge.args[0]=fastmcp
spring.ai.mcp.client.stdio.connections.aws-knowledge.args[1]=run
spring.ai.mcp.client.stdio.connections.aws-knowledge.args[2]=https://knowledge-mcp.global.api.aws
